services:
  hub:
    build: .
    ports:
      - "3100:3100"
      - "16433:16433/udp"
    volumes:
      - fil-data:/data
    environment:
      - PORT=3100
      - DATABASE_URL=sqlite:/data/fil-hub.db?mode=rwc
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3100}
      - QUIC_PORT=${QUIC_PORT:-16433}
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  fil-data:
