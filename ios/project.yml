name: Fil
options:
  bundleIdPrefix: sh.fil
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.13.0"
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture.git
    from: "1.25.0"

targets:
  Fil:
    type: application
    platform: iOS
    sources:
      - path: Fil
    resources:
      - path: Fil/Assets.xcassets
      - path: Fil/Resources
    dependencies:
      - package: SwiftTerm
      - package: ComposableArchitecture
      #- target: FilWidgets  # TODO: fix widget extension install issue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.fil.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Fil
        INFOPLIST_KEY_NSSupportsLiveActivities: true

  FilWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: FilWidgets
    entitlements:
      path: FilWidgets/FilWidgets.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.fil.app.widgets
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FilWidgets
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        SWIFT_EMIT_LOC_STRINGS: true
